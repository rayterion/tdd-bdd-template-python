[tool:pytest]
addopts = --spec --color=yes --cov=src/ --cov-report=term-missing
spec_test_format = {result} {docstring_summary}
pythonpath =
    ./
    ./src
python_files = *_test.py *_tests.py test_*.py

[coverage:run]
# This tells coverage to ignore everything inside any folder named _tests_
omit = 
    */_tests_/*
    # You may also want to exclude the test files themselves if they live in src
    *_test.py
    *_tests.py
    test_*.py
    __init__.py

[coverage:report]
show_missing = True